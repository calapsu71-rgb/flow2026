name: CI Pipeline - CamiloCc

on:
  push:
    branches: 
      - main
      - develop
  pull_request:
    branches: 
      - main
      - develop

jobs:
  test:
    name: ejecute_pruebas
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.x
          - 22.x

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Instalar dependencias
        run: npm ci

      - name: Verificar si existe script de test
        run: |
          if npm run | grep -q "test"; then
            npm test
          else
            echo "No hay tests configurados"
          fi

      - name: Verificar sintaxis del código (solo si existe)
        run: |
          if [ -f "src/app.js" ]; then
            node --check src/app.js
          else
            echo "No existe src/app.js"
          fi